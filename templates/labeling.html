<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Étiquetage Manuel - SAE</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; text-align: center; }
        .canvas-container {
            position: relative;
            display: inline-block; /* Pour que le conteneur s'ajuste à l'image */
            margin-top: 20px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        img, canvas {
            display: block;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            cursor: crosshair;
        }
        .controls { margin-top: 20px; }
        button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
        .btn-save { background: #28a745; color: white; border: none; border-radius: 5px;}
        .btn-clear { background: #dc3545; color: white; border: none; border-radius: 5px;}
    </style>
</head>
<body>

    <h1>Outil d'Étiquetage : {{ image_name }}</h1>
    
    <select id="classSelector">
        <option value="bateau_moteur">Bateau à moteur</option>
        <option value="voilier">Voilier</option>
        <option value="kayak">Kayak</option>
        <option value="paddle">Paddle</option>
    </select>
    
    <div class="controls">
        <button class="btn-clear" onclick="clearBoxes()">🗑️ Effacer tout</button>
        <button class="btn-save" onclick="saveBoxes()">💾 Sauvegarder les labels</button>
    </div>

    <div class="canvas-container">
        <img id="image" src="{{ url_for('static', filename='images/' + image_name) }}" alt="Image à annoter">
        <canvas id="canvas"></canvas>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const image = document.getElementById('image');

        // Variables d'état
        let isDrawing = false;
        let startX, startY;
        let boxes = []; // Tableau Bounding Boxes

        // initialisation canva
        image.onload = function() {
            canvas.width = image.width;
            canvas.height = image.height;
            drawAll(); // Dessine au cas où on recharge des boîtes existantes
        };

        // --- GESTION DE LA SOURIS ---

        // 1. Clic to start drawing
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;
        });

        // 2. Dessin on moove
        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const currentX = e.clientX - rect.left;
            const currentY = e.clientY - rect.top;
            
            const width = currentX - startX;
            const height = currentY - startY;

            drawAll();
            
            ctx.strokeStyle = "red";
            ctx.lineWidth = 2;
            ctx.strokeRect(startX, startY, width, height);
        });

        // 3. On relâche : on valide la boîte et on demande à l'IA
        canvas.addEventListener('mouseup', async (e) => {
            if (!isDrawing) return;
            isDrawing = false;
            
            const rect = canvas.getBoundingClientRect();
            const currentX = e.clientX - rect.left;
            const currentY = e.clientY - rect.top;
            
            // Création de la nouvelle boîte
            let newBox = {
                x: Math.min(startX, currentX),
                y: Math.min(startY, currentY),
                width: Math.abs(currentX - startX),
                height: Math.abs(currentY - startY),
                label: "..." // En attente de l'IA
            };

            // On évite les clics accidentels (boîtes minuscules)
            if (newBox.width < 10 || newBox.height < 10) {
                drawAll();
                return;
            }

            // On ajoute la boîte temporairement pour la voir
            boxes.push(newBox);
            drawAll();

            // 🤖 APPEL À L'IA 🤖
            try {
                const response = await fetch('/api/predict_box/{{ image_name }}', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ box: newBox })
                });
                const data = await response.json();
                
                // Si l'IA a trouvé, on met à jour le label
                if (data.prediction && data.prediction !== 'modèle_absent' && data.prediction !== 'inconnu') {
                    newBox.label = data.prediction;
                } else {
                    // Sinon (ou si le modèle n'existe pas), on prend la valeur du menu déroulant manuel
                    const manualClass = document.getElementById('classSelector') ? document.getElementById('classSelector').value : 'anomalie';
                    newBox.label = manualClass;
                }
            } catch (error) {
                console.error("Erreur de prédiction IA :", error);
                newBox.label = "Erreur IA";
            }
            
            // On redessine tout avec le bon label
            drawAll();
        });

        // --- FONCTIONS UTILITAIRES ---

        function drawAll() {
            // On vide le canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            boxes.forEach(box => {
                // Dessin du rectangle
                ctx.strokeStyle = "#00ff00";
                ctx.lineWidth = 2;
                ctx.fillStyle = "rgba(0, 255, 0, 0.2)"; 
                
                ctx.fillRect(box.x, box.y, box.width, box.height);
                ctx.strokeRect(box.x, box.y, box.width, box.height);

                // Dessin du texte (Le label)
                ctx.fillStyle = "#00ff00";
                ctx.font = "bold 16px Arial";
                // On écrit le texte juste au-dessus de la boîte (ou en dessous si elle touche le bord haut)
                let textY = box.y > 20 ? box.y - 5 : box.y + 20;
                ctx.fillText(box.label, box.x, textY);
            });
        }

        function clearBoxes() {
            boxes = [];
            drawAll();
        }

        // --- SAUVEGARDE FLASK (API) ---

        function saveBoxes() {
            if (boxes.length === 0) {
                alert("Dessine au moins une boîte avant de sauvegarder !");
                return;
            }

            const payload = {
                image: "{{ image_name }}",
                boxes: boxes
            };

            // Requête HTTP POST vers notre serveur Flask
            fetch('/api/save_labels/{{ image_name }}', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => response.json())
            .then(data => {
                alert(data.message);
            })
            .catch(error => {
                console.error("Erreur:", error);
                alert("Erreur lors de la sauvegarde.");
            });
        }
    </script>
</body>
</html>
